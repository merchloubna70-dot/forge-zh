# tmux — Forge-zh 工作台配置

# 鼠标：开启（ToDesk 可转发滚轮事件，用于翻页历史输出）
set -g mouse on

# 滚轮进入复制模式后自动翻页（不进入底部时保持翻页模式）
bind -n WheelUpPane if-shell -F "#{?pane_in_mode,1,0}" \
  "send-keys -M" \
  "copy-mode -e; send-keys -M"
set -g history-limit 200000

# Faster escape
set -sg escape-time 10

# Use 256 colors / truecolor
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Status bar — Warp 风格（GitHub Dark Dimmed 配色）
set -g status on
set -g status-interval 2
set -g status-style "bg=#1c2128,fg=#768390"

# 左侧：session 图标 + 名称
set -g status-left "#[fg=#539bf5,bold]  #S #[fg=#373e47]│#[default] "
set -g status-left-length 30

# 右侧：时间
set -g status-right "#[fg=#373e47]│ #[fg=#768390]%H:%M#[default]"
set -g status-right-length 80

# 面板边框与标题
set -g pane-border-style "fg=#2d333b"
set -g pane-active-border-style "fg=#539bf5"
set -g pane-border-status top
set -g pane-border-format " #[fg=#768390]#{pane_title}#[fg=#373e47] · #[fg=#545d68]#{pane_current_command} #[default]"

# 窗口标签
set -g automatic-rename off
set -g allow-rename off

# 窗口标签格式
set -g window-status-format "#[fg=#545d68] #I #W #[default]"
set -g window-status-current-format "#[fg=#1c2128,bg=#539bf5,bold] #I #W #[default]"

# ── 复制模式（vi 风格）────────────────────────────────
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection

# y 键：tmux buffer + OSC 52（ToDesk 远端剪贴板同步）+ pbcopy 兜底
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "~/.local/bin/forge-zh-yank"

# 鼠标拖拽选中后松开 → 复制（仅保留一条，去除重复绑定）
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "~/.local/bin/forge-zh-yank"

# 普通模式下鼠标拖拽（mouse on 时自动进入 copy-mode 再复制）
bind -T root MouseDrag1Pane   if-shell -F "#{?mouse_any_flag,1,0}" "send-keys -M" "copy-mode -M"
bind -T root MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/.local/bin/forge-zh-yank"

# 单击鼠标左键立即退出 copy-mode（消除滚动后卡在复制模式的割裂感）
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X cancel
bind -T copy-mode    MouseDown1Pane select-pane \; send-keys -X cancel

# ── 快捷键 ─────────────────────────────────────────
# 清屏
bind C-k send-keys C-l

# 粘贴 tmux buffer（ToDesk 远程友好，无需依赖系统剪贴板）
bind v   paste-buffer
bind C-v paste-buffer

# 切换面板（本地：Option+1/2/3；ToDesk 远程：前缀 Ctrl+b 再按 1/2/3）
bind -n M-1 select-pane -t 0
bind -n M-2 select-pane -t 1
bind -n M-3 select-pane -t 2
bind 1 select-pane -t 0
bind 2 select-pane -t 1
bind 3 select-pane -t 2

# 捕获当前面板内容到文件
bind -n M-s capture-pane -pS -2000 \; save-buffer "/tmp/tmux-capture-#{session_name}-#{window_index}-#{pane_index}.txt" \; display-message "已保存：/tmp/tmux-capture-#{session_name}-#{window_index}-#{pane_index}.txt"
bind s capture-pane -pS -2000 \; save-buffer "/tmp/tmux-capture-#{session_name}-#{window_index}-#{pane_index}.txt" \; display-message "已保存：/tmp/tmux-capture-#{session_name}-#{window_index}-#{pane_index}.txt"

# Ensure tmux panes are login shells (load nvm PATH)
set -g default-command "$SHELL -l"

# ── Forge-zh 三栏快捷键 ──────────────────────────────
# Ctrl+b F：创建/跳转 forge-zh 三栏 session
bind F run-shell '~/.local/bin/forge-zh-launch'
